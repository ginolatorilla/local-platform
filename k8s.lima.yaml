images:
  - location: "https://cloud-images.ubuntu.com/releases/22.04/release-20240125/ubuntu-22.04-server-cloudimg-amd64.img"
    arch: "x86_64"
    digest: "sha256:42dcf9757e75c3275486b397a752fb535c7cd8e5232ee5ee349554b7a55f1702"
  - location: "https://cloud-images.ubuntu.com/releases/22.04/release-20240125/ubuntu-22.04-server-cloudimg-arm64.img"
    arch: "aarch64"
    digest: "sha256:0f5f68b9b74686b8a847024364031e2b95e4d3855e5177a99b33d7c55e45907f"
  - location: "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-arm64.img"
    arch: "aarch64"

vmType: vz
rosetta:
  enabled: true
  binfmt: true

cpus: 18        # Somehow, we can exceed the host machine's CPUs ...
memory: 48G     # ... but we can't exceed its memory.
disk: 200G      # For ephemeral storage

containerd:
  user: false
  system: false

mountInotify: true
mountType: virtiofs
mounts:
  - location: "~"
    mountPoint: /mnt/user

provision:
  - mode: system
    script: |
      hostnamectl set-hostname k8s

hostResolver:
  enabled: false

dns:
  - 1.1.1.1
  - 1.0.0.1
  - 8.8.8.8
  - 8.8.4.4