---
apiVersion: kubeadm.k8s.io/v1beta3
kind: InitConfiguration
nodeRegistration:
  criSocket: unix:///var/run/crio/crio.sock
  imagePullPolicy: IfNotPresent
  taints: []
---
apiVersion: kubeadm.k8s.io/v1beta3
kind: ClusterConfiguration
apiServer:
  timeoutForControlPlane: 4m0s
  certSANs:
    - localhost
    - 127.0.0.1
  extraArgs:
    audit-policy-file: /etc/kubernetes/audit-policy.yaml
    audit-log-path: /var/log/kubernetes/audit/audit.log
    service-node-port-range: 80-32767
  extraVolumes:
    - hostPath: /etc/kubernetes/audit-policy.yaml
      mountPath: /etc/kubernetes/audit-policy.yaml
      name: audit-policy
      pathType: File
      readOnly: true
    - hostPath: /mnt/data/kubernetes/audit
      mountPath: /var/log/kubernetes/audit
      name: audit-log
      pathType: DirectoryOrCreate
      readOnly: false
certificatesDir: /etc/kubernetes/pki
clusterName: ginolatorilla
controllerManager: {}
dns:
  imageRepository: registry:5001/registry.k8s.io/coredns
etcd:
  local:
    dataDir: /var/lib/etcd
imageRepository: registry:5001/registry.k8s.io
networking:
  dnsDomain: cluster.local
  serviceSubnet: 172.16.0.0/18
  podSubnet: 10.85.0.0/16  # This is CRIO's default
scheduler: {}
---
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
cgroupDriver: systemd
